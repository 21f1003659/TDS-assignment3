name: Daily Repository Update

on:
  schedule:
    - cron: "15 9 * * *"
  workflow_dispatch:

# ✅ ADD THIS BLOCK
permissions:
  contents: write

jobs:
  daily-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update log - 21f1003659@ds.study.iitm.ac.in
        run: |
          echo "Last updated: $(date -u)" >> daily-log.txt

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add daily-log.txt
          git commit -m "chore: automated daily update" || echo "No changes"
          git push
